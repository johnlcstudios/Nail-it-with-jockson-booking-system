services:
  - type: web
    name: nail-it-with-jockson
    runtime: node
    plan: free
    buildCommand: cd client && npm install && npm run build && cd .. && npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: JocksonNail2026!
      - key: MESSENGER_PAGE_ID
        value: "100069308407532"
      - key: SMS_ENABLED
        value: "false"
    healthCheckPath: /api/services
